{{- if .Values.database.url -}}
## Separate Secret for the database URL so it is not stored in the ConfigMap.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "scutum.fullname" . }}-db
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "scutum.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.database.url | quote }}
{{- end }}
