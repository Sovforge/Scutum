  /sync/register-edge:
    post:
      tags: [Sync]
      summary: Register an edge node
      description: |
        Adds a remote edge node as a sync target. Subsequent calls to
        `POST /sync/push` will distribute configuration to this node.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterEdgeRequest'
      responses:
        '200':
          description: Edge registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: registered
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /sync/push:
    post:
      tags: [Sync]
      summary: Push config to all edge nodes
      description: |
        Collects the current peer list and enabled plugin set from the database
        and distributes them to all registered edge nodes via HMAC-signed payloads.
      responses:
        '200':
          description: Push results
          content:
