          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ── Recovery ──────────────────────────────────────────────────────────────
  /recovery/generate-shares:
    post:
      tags: [Recovery]
      summary: Split master key into Shamir shares
      description: |
        Splits the provided master key into 5 Shamir secret shares with a
        threshold of 4. Distribute shares to separate custodians for offline storage.
        **Nothing is retained server-side after this call.**
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateSharesRequest'
      responses:
        '200':
          description: Shares generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateSharesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /recovery/recover:
    post:
      tags: [Recovery]
      summary: Emergency key recovery
      description: |
        Full emergency recovery workflow:
        1. Reconstructs the old master key from at least 4 shares.
        2. Verifies it against the stored digest.
        3. Generates a new master key.
        4. Re-encrypts all DEKs under the new key.
        5. Returns fresh shares for the new key.

        **The old shares are invalidated after this call.**
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecoverRequest'
      responses:
        '200':
          description: Recovery successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecoverResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /recovery/reissue-shares:
    post:
      tags: [Recovery]
      summary: Reissue shares without key rotation
      description: |
        Reconstructs the current master key from existing shares and re-splits it
        into 5 fresh shares. Use this when a share holder leaves or a share is
        suspected compromised. No DEKs are re-encrypted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReissueRequest'
      responses:
        '200':
          description: Shares reissued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReissueResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

