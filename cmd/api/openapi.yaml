      summary: Load a plugin
      description: Loads a WASM plugin binary and registers its HTTP routes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoadPluginRequest'
      responses:
        '200':
          description: Plugin loaded
          content:
            text/plain:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /plugins/upload:
    post:
      tags: [Plugins]
      summary: Upload and load a WASM plugin
      description: |
        Accepts a multipart form upload of a `.wasm` binary, saves it to the
        plugins directory, and immediately loads it into the WASM sandbox.
        The plugin name is used as the route prefix and must be unique.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, name]
              properties:
                file:
                  type: string
                  format: binary
                  description: WASM binary (.wasm)
                name:
                  type: string
                  description: Unique plugin name
                description:
                  type: string
                  description: Optional human-readable description
      responses:
        '201':
          description: Plugin uploaded and loaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  path:
                    type: string
        '400':
